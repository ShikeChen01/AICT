apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sandbox-pool-windows
  namespace: sandboxes
spec:
  serviceName: sandbox-pool-windows
  replicas: 1
  selector:
    matchLabels:
      app: sandbox
      os-family: windows
  template:
    metadata:
      labels:
        app: sandbox
        os-family: windows
        status: idle
    spec:
      nodeSelector:
        kubernetes.io/os: windows
      tolerations:
        - key: node.kubernetes.io/os
          operator: Equal
          value: windows
          effect: NoSchedule
      containers:
        - name: sandbox
          image: us-central1-docker.pkg.dev/aict-487016/aict-dev/sandbox-windows-2022:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: sandbox-pool-secrets
                  key: master-token
            - name: SANDBOX_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sandbox-pool-secrets
                  key: jwt-secret
            - name: SANDBOX_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          volumeMounts:
            - name: workspace
              mountPath: "C:\\workspace"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
        storageClassName: standard-rwo
