# AICT PostgreSQL 16 configuration for self-hosted VM
# Tuned for e2-small (2 vCPU, 4 GB RAM)

# ── Connection ────────────────────────────────────────────
listen_addresses = '*'
port = 5432
max_connections = 100

# ── SSL ───────────────────────────────────────────────────
ssl = on
ssl_cert_file = '/etc/postgresql/ssl/server.crt'
ssl_key_file = '/etc/postgresql/ssl/server.key'

# ── Memory (4 GB total, leave ~1.5 GB for OS + Docker) ───
shared_buffers = 1GB
effective_cache_size = 2GB
work_mem = 16MB
maintenance_work_mem = 256MB

# ── WAL ───────────────────────────────────────────────────
wal_buffers = 32MB
min_wal_size = 256MB
max_wal_size = 1GB
checkpoint_completion_target = 0.9

# ── Query planner ─────────────────────────────────────────
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# ── Logging ───────────────────────────────────────────────
log_timezone = 'UTC'
timezone = 'UTC'
log_min_duration_statement = 1000
log_line_prefix = '%m [%p] %q%u@%d '

# ── Autovacuum ────────────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 3
