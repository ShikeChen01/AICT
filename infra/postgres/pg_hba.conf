# PostgreSQL client authentication configuration
#
# GCE firewall rules restrict which IPs can reach port 5432,
# so pg_hba allows all SSL connections and relies on the
# network-level firewall for IP filtering.

# TYPE  DATABASE  USER  ADDRESS      METHOD

# Unix socket (local container health checks)
local   all       all                trust

# SSL connections from any IP (firewall handles restriction)
hostssl all       all   0.0.0.0/0    scram-sha-256
hostssl all       all   ::/0         scram-sha-256
