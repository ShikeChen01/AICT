[alembic]
script_location = backend/migrations

# Fallback URL — overridden by DATABASE_URL env var in env.py
sqlalchemy.url = postgresql+asyncpg://aict:aict@localhost:5432/aict

# Naming template for autogenerated revisions.
# Format: NNN_snake_case_slug  (e.g. 002_add_user_avatar)
# The sequential prefix is added manually; this template handles the slug.
file_template = %%(rev)s_%%(slug)s

# Truncate long slugs
truncate_slug_length = 60

# Timezone for Create Date header in migration files
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
