<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Canvas E2E Harness</title>
  <style>
    /* VS Code theme variables (dark theme defaults) for webview */
    :root {
      --color-background: #1e1e1e;
      --color-foreground: #d4d4d4;
      --color-sidebar-background: #252526;
      --color-input-background: #3c3c3c;
      --color-input-border: #3c3c3c;
      --color-button-background: #0e639c;
      --color-button-foreground: #ffffff;
      --color-focus-border: #007acc;
      --color-widget-border: #303031;
      --color-description: #ccccccb3;
      --color-error: #f48771;
      --color-bucket: #2196f3;
      --color-bucket-bg: rgba(33, 150, 243, 0.1);
      --color-module: #9c27b0;
      --color-module-bg: rgba(156, 39, 176, 0.1);
      --color-block: #4caf50;
      --color-block-bg: rgba(76, 175, 80, 0.1);
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 12px;
      --spacing-lg: 16px;
      --spacing-xl: 24px;
      --radius-sm: 4px;
      --radius-md: 6px;
      --radius-lg: 8px;
      --radius-xl: 12px;
      --font-size-xs: 10px;
      --font-size-sm: 11px;
      --font-size-md: 12px;
      --font-size-lg: 13px;
      --font-size-xl: 14px;
      --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: var(--font-family); background: var(--color-background); color: var(--color-foreground); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    window.process = { env: {} };
  </script>
  <script src="mock-vscode-api.js"></script>
  <script src="/dist/webview.js"></script>
</body>
</html>
