name: Test Suite

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]
  workflow_call:

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # ============================================================================
  # Backend Unit Tests (fast, SQLite)
  # ============================================================================
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Configure git identity
        run: |
          git config --global user.name "AICT CI Bot"
          git config --global user.email "ci@aict.dev"

      - name: Run unit tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short -m "not integration" --ignore=tests/test_api_integration.py
        env:
          ENV: development
          API_TOKEN: test-token

  # ============================================================================
  # Backend Integration Tests (PostgreSQL via testcontainers)
  # ============================================================================
  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run migrations
        run: alembic -c backend/alembic.ini upgrade head
        env:
          PYTHONPATH: '.'
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test

      - name: Run integration tests
        run: |
          cd backend
          python -m pytest tests/test_api_integration.py -v --tb=short -m "integration or not integration"
        env:
          INTEGRATION_TEST: '1'
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          ENV: development
          API_TOKEN: test-token

  # ============================================================================
  # Frontend Unit Tests (Vitest)
  # ============================================================================
  frontend-unit-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run unit tests
        run: |
          cd frontend
          npm test

      - name: Run lint
        run: |
          cd frontend
          npm run lint

  # ============================================================================
  # E2E Tests (Playwright)
  # ============================================================================
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, frontend-unit-tests]
    
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Run migrations
        run: alembic -c backend/alembic.ini upgrade head
        env:
          PYTHONPATH: '.'
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test

      - name: Seed test data
        run: python -m backend.scripts.seed || echo "Seed script not available, continuing..."
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          ENV: development

      - name: Run E2E tests (excluding GitHub integration)
        run: |
          cd frontend
          npx playwright test --project=chromium --ignore-snapshots \
            projects.spec.ts kanban.spec.ts
        env:
          CI: true
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          ENV: development
          API_TOKEN: test-token
          VITE_BACKEND_URL: http://localhost:8000
          FRONTEND_URL: http://localhost:3000
          BACKEND_URL: http://localhost:8000
          CODE_REPO_PATH: ${{ runner.temp }}/repos
          SPEC_REPO_PATH: ${{ runner.temp }}/specs

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ============================================================================
  # Build Verification Tests (full-stack smoke test — non-blocking)
  # This test imports a real repo and talks to LLMs, so it may fail due to
  # transient credential or network issues. It must not gate deployments.
  # ============================================================================
  build-verification-tests:
    name: Build Verification Tests
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, frontend-unit-tests]
    continue-on-error: true

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Run migrations
        run: alembic -c backend/alembic.ini upgrade head
        env:
          PYTHONPATH: '.'
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test

      - name: Run build verification tests
        run: |
          cd frontend
          npx playwright test build-verification.spec.ts --project=chromium
        env:
          CI: true
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          ENV: development
          API_TOKEN: ${{ secrets.API_TOKEN }}
          VITE_BACKEND_URL: http://localhost:8000
          BACKEND_URL: http://localhost:8000
          FRONTEND_URL: http://localhost:3000
          CODE_REPO_PATH: ${{ runner.temp }}/repos
          SPEC_REPO_PATH: ${{ runner.temp }}/specs
          # Test login credentials
          TEST_LOGIN_ENABLED: 'true'
          TEST_LOGIN_EMAIL: ${{ secrets.TEST_LOGIN_EMAIL }}
          TEST_LOGIN_PASSWORD: ${{ secrets.TEST_LOGIN_PASSWORD }}
          # Test repository
          GITHUB_TEST_TOKEN: ${{ secrets.GH_TEST_TOKEN }}
          GITHUB_TEST_REPOSITORY_LINK: ${{ secrets.GH_TEST_REPOSITORY_LINK }}
          # Enable full LLM round-trip check when keys are available
          WAIT_FOR_AGENT_RESPONSE: 'true'
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

      - name: Upload build verification report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-verification-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

  # ============================================================================
  # GitHub Integration Tests (runs only on main — non-blocking)
  # ============================================================================
  github-integration-tests:
    name: GitHub Integration Tests
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true
    
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          cd frontend && npm ci

      - name: Install Playwright
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Run migrations
        run: alembic -c backend/alembic.ini upgrade head
        env:
          PYTHONPATH: '.'
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test

      - name: Run GitHub integration tests
        run: |
          cd frontend
          if [ -f e2e/github-integration.spec.ts ]; then
            npx playwright test github-integration.spec.ts --project=chromium
          else
            echo "github-integration.spec.ts not found, skipping"
          fi
        env:
          CI: true
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          ENV: development
          API_TOKEN: ${{ secrets.API_TOKEN }}
          VITE_BACKEND_URL: http://localhost:8000
          FRONTEND_URL: http://localhost:3000
          BACKEND_URL: http://localhost:8000
          CODE_REPO_PATH: ${{ runner.temp }}/repos
          SPEC_REPO_PATH: ${{ runner.temp }}/specs
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN_TEST: ${{ secrets.GITHUB_TOKEN_TEST }}
          GITHUB_TEST_OWNER: ${{ secrets.GITHUB_TEST_OWNER }}
          TEST_PROJECT_ID: ${{ secrets.TEST_PROJECT_ID }}
          CLEANUP_TEST_REPOS: 'true'

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: github-integration-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7
