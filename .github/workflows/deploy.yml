name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: 'Deploy backend to Cloud Run'
        type: boolean
        default: true
      deploy_frontend:
        description: 'Deploy frontend to Firebase Hosting'
        type: boolean
        default: true

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'
  GCLOUD_PROJECT_ID: ${{ secrets.GCLOUD_PROJECT_ID }}
  GCLOUD_REGION: us-central1
  GCLOUD_ARTIFACT_REGISTRY_URL: ${{ secrets.GCLOUD_ARTIFACT_REGISTRY_URL }}
  CLOUD_RUN_SERVICE: aict-backend-dev

# Only one deploy at a time
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ============================================================================
  # Detect which parts of the codebase changed
  # ============================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'Dockerfile'
              - 'requirements.txt'
            frontend:
              - 'frontend/**'
              - 'firebase.json'

  # ============================================================================
  # Backend: Build Docker image → Push to Artifact Registry
  # ============================================================================
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      (needs.changes.outputs.backend == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_backend)
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker \
            $(echo "$GCLOUD_ARTIFACT_REGISTRY_URL" | cut -d'/' -f1) \
            --quiet

      - name: Build and push with Cloud Build
        id: build
        run: |
          IMAGE_SHA="${GCLOUD_ARTIFACT_REGISTRY_URL}/backend:${{ github.sha }}"
          IMAGE_LATEST="${GCLOUD_ARTIFACT_REGISTRY_URL}/backend:latest"
          gcloud builds submit \
            --project "$GCLOUD_PROJECT_ID" \
            --tag "$IMAGE_SHA" \
            --timeout=1200 .
          # Keep latest as a convenience alias, but deploy from the immutable SHA tag.
          gcloud artifacts docker tags add "$IMAGE_SHA" "$IMAGE_LATEST" \
            --quiet 2>/dev/null || true
          echo "image=$IMAGE_SHA" >> "$GITHUB_OUTPUT"

    outputs:
      image: ${{ steps.build.outputs.image }}

  # ============================================================================
  # Backend: Run database migrations against self-hosted Postgres VM
  # ============================================================================
  migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    needs: [changes, build-backend]
    if: |
      (needs.changes.outputs.backend == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_backend)
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'beta'

      - name: Run migrations via Cloud Run Job
        run: |
          JOB_NAME="aict-migrate-dev"
          IMAGE="${GCLOUD_ARTIFACT_REGISTRY_URL}/backend:${{ github.sha }}"
          MIGRATE_CMD="python -m backend.scripts.upgrade_db"
          DB_HOST="${{ secrets.POSTGRES_VM_HOST }}"
          DB_PORT="${{ secrets.POSTGRES_VM_PORT }}"
          DB_USER="${{ secrets.POSTGRES_VM_USER }}"
          DB_PASSWORD="${{ secrets.POSTGRES_VM_PASSWORD }}"
          DB_NAME="${{ secrets.POSTGRES_VM_DB }}"
          DB_SSL_MODE="${{ secrets.DB_SSL_MODE }}"
          VPC_CONNECTOR_NAME="${{ secrets.VPC_CONNECTOR_NAME }}"
          ORCH_HOST="${{ secrets.SANDBOX_ORCHESTRATOR_HOST }}"
          ORCH_PORT="${{ secrets.SANDBOX_ORCHESTRATOR_PORT }}"
          ORCH_TOKEN="${{ secrets.SANDBOX_ORCHESTRATOR_TOKEN }}"
          VM_HOST="${{ secrets.SANDBOX_VM_HOST }}"
          VM_INTERNAL_HOST="${{ secrets.SANDBOX_VM_INTERNAL_HOST }}"
          VM_POOL_PORT="${{ secrets.SANDBOX_VM_POOL_PORT }}"
          VM_MASTER_TOKEN="${{ secrets.SANDBOX_VM_MASTER_TOKEN }}"

          DB_PORT="${DB_PORT:-5432}"
          DB_USER="${DB_USER:-aict}"
          DB_NAME="${DB_NAME:-aict}"

          if [ -z "$DB_HOST" ] || [ -z "$DB_PASSWORD" ] || [ -z "$VPC_CONNECTOR_NAME" ]; then
            echo "Missing required self-hosted Postgres migration secrets"
            exit 1
          fi

          ENCODED_DB_PASSWORD="$(DB_PASSWORD="$DB_PASSWORD" python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["DB_PASSWORD"], safe=""))')"
          DATABASE_URL="postgresql+asyncpg://${DB_USER}:${ENCODED_DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"

          if [ -z "$IMAGE" ]; then
            echo "Resolved migration image is empty"
            exit 1
          fi

          # Check if job exists
          if gcloud run jobs describe "$JOB_NAME" \
              --project "$GCLOUD_PROJECT_ID" \
              --region "$GCLOUD_REGION" \
              --format="value(metadata.name)" 2>/dev/null; then
            echo "Updating existing migration job..."
            gcloud run jobs update "$JOB_NAME" \
              --project "$GCLOUD_PROJECT_ID" \
              --image "$IMAGE" \
              --region "$GCLOUD_REGION" \
              --command "/bin/sh" \
              --args="-c,$MIGRATE_CMD" \
              --set-env-vars="ENV=development,PYTHONPATH=/app" \
              --set-env-vars="DATABASE_URL=$DATABASE_URL" \
              --set-env-vars="DB_SSL_MODE=$DB_SSL_MODE" \
              --set-env-vars="API_TOKEN=${{ secrets.API_TOKEN }}" \
              --vpc-connector "$VPC_CONNECTOR_NAME" \
              --vpc-egress private-ranges-only \
              --max-retries 0 \
              --task-timeout 600s
          else
            echo "Creating new migration job..."
            gcloud run jobs create "$JOB_NAME" \
              --project "$GCLOUD_PROJECT_ID" \
              --image "$IMAGE" \
              --region "$GCLOUD_REGION" \
              --command "/bin/sh" \
              --args="-c,$MIGRATE_CMD" \
              --set-env-vars="ENV=development,PYTHONPATH=/app" \
              --set-env-vars="DATABASE_URL=$DATABASE_URL" \
              --set-env-vars="DB_SSL_MODE=$DB_SSL_MODE" \
              --set-env-vars="API_TOKEN=${{ secrets.API_TOKEN }}" \
              --vpc-connector "$VPC_CONNECTOR_NAME" \
              --vpc-egress private-ranges-only \
              --max-retries 0 \
              --task-timeout 600s
          fi

          echo "Executing migration..."
          if ! gcloud run jobs execute "$JOB_NAME" \
            --project "$GCLOUD_PROJECT_ID" \
            --region "$GCLOUD_REGION" \
            --wait; then
            echo "--- Migration job failed. Fetching Cloud Logging output... ---"
            sleep 10  # Brief pause for log ingestion
            gcloud logging read \
              "resource.type=\"cloud_run_job\" AND resource.labels.job_name=\"${JOB_NAME}\"" \
              --project "$GCLOUD_PROJECT_ID" \
              --limit 50 \
              --freshness 15m \
              --format "value(textPayload)" \
              --order desc 2>/dev/null | tac || echo "(Could not retrieve logs — check GCP Console)"
            exit 1
          fi

  # ============================================================================
  # Backend: Deploy to Cloud Run
  # ============================================================================
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [build-backend, migrate]
    # Deploy if build succeeded and migrations either passed or were skipped.
    # Block deploy if migrations actually failed to prevent schema drift.
    if: |
      always() &&
      needs.build-backend.result == 'success' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${GCLOUD_ARTIFACT_REGISTRY_URL}/backend:${{ github.sha }}"
          DB_HOST="${{ secrets.POSTGRES_VM_HOST }}"
          DB_PORT="${{ secrets.POSTGRES_VM_PORT }}"
          DB_USER="${{ secrets.POSTGRES_VM_USER }}"
          DB_PASSWORD="${{ secrets.POSTGRES_VM_PASSWORD }}"
          DB_NAME="${{ secrets.POSTGRES_VM_DB }}"
          DB_SSL_MODE="${{ secrets.DB_SSL_MODE }}"
          VPC_CONNECTOR_NAME="${{ secrets.VPC_CONNECTOR_NAME }}"
          ORCH_HOST="${{ secrets.SANDBOX_ORCHESTRATOR_HOST }}"
          ORCH_PORT="${{ secrets.SANDBOX_ORCHESTRATOR_PORT }}"
          ORCH_TOKEN="${{ secrets.SANDBOX_ORCHESTRATOR_TOKEN }}"
          VM_HOST="${{ secrets.SANDBOX_VM_HOST }}"
          VM_INTERNAL_HOST="${{ secrets.SANDBOX_VM_INTERNAL_HOST }}"
          VM_POOL_PORT="${{ secrets.SANDBOX_VM_POOL_PORT }}"
          VM_MASTER_TOKEN="${{ secrets.SANDBOX_VM_MASTER_TOKEN }}"

          DB_PORT="${DB_PORT:-5432}"
          DB_USER="${DB_USER:-aict}"
          DB_NAME="${DB_NAME:-aict}"

          if [ -z "$DB_HOST" ] || [ -z "$DB_PASSWORD" ] || [ -z "$VPC_CONNECTOR_NAME" ]; then
            echo "Missing required self-hosted Postgres deploy secrets"
            exit 1
          fi

          ENCODED_DB_PASSWORD="$(DB_PASSWORD="$DB_PASSWORD" python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["DB_PASSWORD"], safe=""))')"
          DATABASE_URL="postgresql+asyncpg://${DB_USER}:${ENCODED_DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"

          if [ -z "$IMAGE" ]; then
            echo "Resolved deploy image is empty"
            exit 1
          fi

          SANDBOX_ENV_ARGS=()
          if [ -n "$ORCH_HOST" ]; then
            echo "Using sandbox orchestrator configuration for deploy"
            SANDBOX_ENV_ARGS+=("--update-env-vars=SANDBOX_ORCHESTRATOR_HOST=$ORCH_HOST")
            SANDBOX_ENV_ARGS+=("--update-env-vars=SANDBOX_ORCHESTRATOR_PORT=$ORCH_PORT")
            SANDBOX_ENV_ARGS+=("--update-env-vars=SANDBOX_ORCHESTRATOR_TOKEN=$ORCH_TOKEN")
            SANDBOX_ENV_ARGS+=("--remove-env-vars=SANDBOX_VM_HOST,SANDBOX_VM_INTERNAL_HOST,SANDBOX_VM_POOL_PORT,SANDBOX_VM_MASTER_TOKEN")
          elif [ -n "$VM_HOST" ] || [ -n "$VM_INTERNAL_HOST" ]; then
            echo "Using legacy sandbox VM configuration for deploy"
            SANDBOX_ENV_ARGS+=("--update-env-vars=SANDBOX_VM_HOST=$VM_HOST")
            SANDBOX_ENV_ARGS+=("--update-env-vars=SANDBOX_VM_INTERNAL_HOST=$VM_INTERNAL_HOST")
            SANDBOX_ENV_ARGS+=("--update-env-vars=SANDBOX_VM_POOL_PORT=${VM_POOL_PORT:-9090}")
            SANDBOX_ENV_ARGS+=("--update-env-vars=SANDBOX_VM_MASTER_TOKEN=$VM_MASTER_TOKEN")
            SANDBOX_ENV_ARGS+=("--remove-env-vars=SANDBOX_ORCHESTRATOR_HOST,SANDBOX_ORCHESTRATOR_PORT,SANDBOX_ORCHESTRATOR_TOKEN")
          else
            echo "No sandbox backend secrets configured; sandbox/VNC features will remain unavailable"
            SANDBOX_ENV_ARGS+=("--remove-env-vars=SANDBOX_ORCHESTRATOR_HOST,SANDBOX_ORCHESTRATOR_PORT,SANDBOX_ORCHESTRATOR_TOKEN,SANDBOX_VM_HOST,SANDBOX_VM_INTERNAL_HOST,SANDBOX_VM_POOL_PORT,SANDBOX_VM_MASTER_TOKEN")
          fi

          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --project "$GCLOUD_PROJECT_ID" \
            --image "$IMAGE" \
            --region "$GCLOUD_REGION" \
            --platform managed \
            --allow-unauthenticated \
            --vpc-connector "$VPC_CONNECTOR_NAME" \
            --vpc-egress private-ranges-only \
            --update-env-vars="ENV=development" \
            --update-env-vars="DATABASE_URL=$DATABASE_URL" \
            --update-env-vars="DB_SSL_MODE=$DB_SSL_MODE" \
            --update-env-vars="API_TOKEN=${{ secrets.API_TOKEN }}" \
            --update-env-vars="FIREBASE_CREDENTIALS_PATH=${{ secrets.FIREBASE_CREDENTIALS_PATH }}" \
            --update-env-vars="FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" \
            --update-env-vars="CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}" \
            --update-env-vars="GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --update-env-vars="OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
            --update-env-vars="MOONSHOT_API_KEY=${{ secrets.MOONSHOT_API_KEY }}" \
            --update-env-vars="MANAGER_MODEL_DEFAULT=${{ secrets.MANAGER_MODEL_DEFAULT }}" \
            --update-env-vars="CTO_MODEL_DEFAULT=${{ secrets.CTO_MODEL_DEFAULT }}" \
            --update-env-vars="ENGINEER_MODEL_DEFAULT=${{ secrets.ENGINEER_MODEL_DEFAULT }}" \
            --update-env-vars="ENGINEER_JUNIOR_MODEL=${{ secrets.ENGINEER_MODEL_DEFAULT }}" \
            --update-env-vars="GITHUB_TOKEN=${{ secrets.GH_REPO_TOKEN }}" \
            --update-env-vars="SECRET_ENCRYPTION_KEY=${{ secrets.SECRET_ENCRYPTION_KEY }}" \
            --update-env-vars="VOYAGE_API_KEY=${{ secrets.VOYAGE_API_KEY }}" \
            --update-env-vars="^;;^ALLOWED_ORIGINS=https://aict-487016.web.app,http://localhost:3000,http://localhost:5173,http://localhost:8000" \
            --update-env-vars="PROVISION_REPOS_ON_STARTUP=false" \
            --update-env-vars="CLONE_CODE_REPO_ON_STARTUP=false" \
            --update-env-vars="MAX_ENGINEERS=5" \
            "${SANDBOX_ENV_ARGS[@]}" \
            --min-instances 1 \
            --cpu-boost \
            --no-cpu-throttling \
            --timeout 3600 \
            --session-affinity

      - name: Get service URL
        id: url
        run: |
          URL=$(gcloud run services describe "$CLOUD_RUN_SERVICE" \
            --project "$GCLOUD_PROJECT_ID" \
            --region "$GCLOUD_REGION" \
            --format="value(status.url)")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Backend deployed to: $URL"

    outputs:
      url: ${{ steps.url.outputs.url }}

  # ============================================================================
  # Frontend: Build and deploy to Firebase Hosting
  # ============================================================================
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      (needs.changes.outputs.frontend == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_frontend)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build
        env:
          # Firebase config injected at build time via Vite env vars
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: aict-487016
          channelId: live

  # ============================================================================
  # Post-deploy: Health check and smoke test
  # ============================================================================
  verify:
    name: Post-deploy Verification
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    # Run if either deploy succeeded (the other may have been skipped)
    if: |
      always() &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') &&
      (needs.deploy-frontend.result == 'success' || needs.deploy-frontend.result == 'skipped') &&
      (needs.deploy-backend.result == 'success' || needs.deploy-frontend.result == 'success')

    steps:
      - name: Resolve backend URL
        id: resolve
        run: |
          # Use output from deploy-backend if available, otherwise fall back to secret
          URL="${{ needs.deploy-backend.outputs.url }}"
          if [ -z "$URL" ]; then
            URL="${{ secrets.GCLOUD_BACKEND_URL }}"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Backend URL: $URL"

      - name: Wait for Cloud Run to stabilize
        run: sleep 15

      - name: Health check (public)
        run: |
          URL="${{ steps.resolve.outputs.url }}"
          echo "Checking $URL/api/v1/health ..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/v1/health" --max-time 10) || true
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 12 attempts"
          exit 1

      - name: Health check (internal)
        run: |
          URL="${{ steps.resolve.outputs.url }}"
          RESP=$(curl -sf "$URL/internal/agent/health" --max-time 10)
          echo "Internal health: $RESP"
          echo "$RESP" | grep -q '"ok"' || (echo "Internal health check failed" && exit 1)

      - name: API smoke test
        run: |
          URL="${{ steps.resolve.outputs.url }}"
          TOKEN="${{ secrets.API_TOKEN }}"
          EMAIL="${{ secrets.TEST_LOGIN_EMAIL }}"
          PASSWORD="${{ secrets.TEST_LOGIN_PASSWORD }}"

          if [ -n "$EMAIL" ] && [ -n "$PASSWORD" ]; then
            LOGIN_RESP=$(curl -sf "$URL/testfads89213xlogin" \
              -H "Content-Type: application/json" \
              -d "{\"email\":\"$EMAIL\",\"password\":\"$PASSWORD\"}" \
              --max-time 10)
            TOKEN=$(echo "$LOGIN_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
            echo "Using token from test login"
          fi

          REPOS=$(curl -sf "$URL/api/v1/repositories" \
            -H "Authorization: Bearer $TOKEN" \
            --max-time 10)
          COUNT=$(echo "$REPOS" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "0")
          echo "Repositories found: $COUNT"

          if [ "$COUNT" = "0" ]; then
            echo "Warning: no repositories returned (may be expected for fresh deployment)"
          else
            PROJECT_ID=$(echo "$REPOS" | python3 -c "import sys,json; repos=json.load(sys.stdin); print(repos[0]['id'])")
            curl -sf "$URL/api/v1/agents?project_id=$PROJECT_ID" \
              -H "Authorization: Bearer $TOKEN" \
              --max-time 10 >/dev/null
            curl -sf "$URL/api/v1/agents/status?project_id=$PROJECT_ID" \
              -H "Authorization: Bearer $TOKEN" \
              --max-time 10 >/dev/null
            curl -sf "$URL/api/v1/sandboxes?project_id=$PROJECT_ID" \
              -H "Authorization: Bearer $TOKEN" \
              --max-time 10 >/dev/null
            echo "Dashboard-critical API checks passed"
          fi

          echo "Smoke test passed"
